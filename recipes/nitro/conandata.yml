      patch_type: "portability"
    - patch_file: "patches/2.11.7-0002-macos-xerces-frameworks.patch"
      patch_description: "Add CoreServices/CoreFoundation frameworks to the XML_HOME link probe on macOS so it can validate Apple xerces builds."
      patch_type: "portability"
