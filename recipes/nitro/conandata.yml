sources:
  "2.11.7":
    url: "https://github.com/mdaus/nitro/archive/refs/tags/NITRO-2.11.7.tar.gz"
    sha256: "47bbb8cff9faeed2fa2be302a2276f0198f05905aa769373343916d89e04dbcc"

patches:
  "2.11.7":
    - patch_file: "patches/2.11.7-0001-fix-char8t-cxx20-compat.patch"
      patch_description: "Silence -Wc++20-compat warning..."
      patch_type: "portability"
    - patch_file: "patches/2.11.7-0002-macos-xerces-frameworks.patch"
      patch_description: "Add CoreServices/CoreFoundation frameworks to the XML_HOME link probe on macOS so it can validate Apple xerces builds."
      patch_type: "portability"
    - patch_file: "patches/2.11.7-0003-disable-werror.patch"
      patch_description: "Remove -Werror from the two top-level CMakeLists files (nitro + coda-oss). Apple Clang and aarch64 gcc flag real upstream issues in coda-oss/sys/DateTime.cpp and str/Convert.h that x86_64 gcc doesn't, and -Werror makes the build a function of compiler version. Warnings still print."
      patch_type: "portability"