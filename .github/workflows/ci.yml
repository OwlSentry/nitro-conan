name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-14   # M1, arm64-only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.4"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.name }}-${{ hashFiles('recipes/nitro/conanfile.py', 'recipes/nitro/conandata.yml', 'recipes/nitro/patches/**') }}
          restore-keys: |
            conan-${{ matrix.name }}-

      - name: Detect default profile
        run: |
          conan profile detect --force
          conan profile show

      - name: conan create
        run: conan create recipes/nitro --build=missing

      - name: Dump CMake error logs on failure
        if: failure()
        shell: bash
        run: |
          find ~/.conan2/p -name 'CMakeError.log' -exec sh -c 'echo "=== $1 ==="; cat "$1"' _ {} \;
          find ~/.conan2/p -name 'CMakeOutput.log' -exec sh -c 'echo "=== $1 ==="; tail -100 "$1"' _ {} \;